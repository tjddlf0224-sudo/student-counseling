<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="상담일지">
<title>상담일지 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #5D4037;
  --secondary: #D7CCC8;
  --accent: #A1887F;
  --bg: #F5F5DC;
  --paper: #FFFDF5;
  --green: #2E7D32;
  --green-bg: #E8F5E9;
  --orange: #E65100;
  --orange-bg: #FFF3E0;
  --blue: #1565C0;
  --blue-bg: #E3F2FD;
  --pink: #880E4F;
  --pink-bg: #FCE4EC;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100vh; background: var(--bg); font-family: 'Nanum Myeongjo', serif; }
body { display: flex; justify-content: center; }

/* 장원급제반과 동일 구조 */
#app { width: 100%; max-width: 420px; background: var(–paper); min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); }

.header {
text-align: center; padding: 20px 16px 14px;
padding-top: calc(20px + var(–safe-top));
border-bottom: 2px solid var(–primary);
background: url(‘https://www.transparenttextures.com/patterns/aged-paper.png’);
}
.title { font-size: 1.8rem; font-weight: 800; letter-spacing: 4px; color: var(–primary); }

.tab-bar { display: flex; border-bottom: 2px solid var(–secondary); background: var(–paper); }
.tab-btn {
flex: 1; padding: 11px 4px;
background: transparent; border: none; border-bottom: 3px solid transparent; margin-bottom: -2px;
font-family: inherit; font-size: 0.8rem; color: #999; cursor: pointer; transition: all .2s;
}
.tab-btn.active { color: var(–primary); border-bottom-color: var(–primary); font-weight: bold; }

.container { padding: 16px; }

.btn {
display: block; width: 100%; padding: 14px; margin: 8px 0;
background: var(–primary); color: white; border: none;
font-family: inherit; font-size: 1rem; cursor: pointer; border-radius: 6px;
transition: opacity .2s, transform .1s;
}
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; }
.btn-outline { background: transparent; border: 2px solid var(–primary); color: var(–primary); }
.btn-sm { display: inline-block; width: auto; padding: 6px 12px; font-size: 0.82rem; margin: 0; }

select, input[type=“date”], textarea {
width: 100%; padding: 10px 12px; margin: 5px 0 10px;
border: 1px solid var(–accent); border-radius: 6px;
font-family: inherit; font-size: 0.95rem; background: white; outline: none;
transition: border-color .15s;
}
select:focus, input:focus, textarea:focus { border-color: var(–primary); }
textarea { resize: vertical; min-height: 80px; }
label { font-size: 0.82rem; color: #666; display: block; margin-top: 4px; }

.type-badge { display: inline-block; font-size: 0.72rem; padding: 2px 9px; border-radius: 12px; font-weight: bold; }
.type-학업 { background: var(–blue-bg);   color: var(–blue); }
.type-생활 { background: var(–green-bg);  color: var(–green); }
.type-진로 { background: var(–orange-bg); color: var(–orange); }
.type-심리 { background: var(–pink-bg);   color: var(–pink); }
.type-기타 { background: #F5F5F5; color: #666; }

.counsel-card {
background: white; border: 1px solid #e0e0e0; border-radius: 8px;
padding: 13px 14px; margin-bottom: 10px;
}
.counsel-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.counsel-name { font-weight: 700; font-size: 0.95rem; }
.counsel-num  { font-size: 0.75rem; color: #999; }
.counsel-content { font-size: 0.88rem; line-height: 1.65; color: #333; white-space: pre-wrap; }
.counsel-memo { font-size: 0.8rem; color: #888; margin-top: 7px; padding-top: 7px; border-top: 1px dashed #eee; }
.counsel-actions { display: flex; gap: 6px; margin-top: 10px; justify-content: flex-end; }
.icon-btn {
background: none; border: 1px solid #ddd; padding: 5px 10px; border-radius: 6px;
cursor: pointer; font-size: 0.8rem; color: #888; transition: all .15s; font-family: inherit;
}
.icon-btn:hover { border-color: var(–primary); color: var(–primary); }
.icon-btn.del:hover { border-color: #e53935; color: #e53935; }

.date-nav {
display: flex; align-items: center; gap: 8px;
padding: 10px 14px; border-bottom: 1px solid var(–secondary); background: var(–paper);
}
.dnav-btn {
background: var(–secondary); border: none; width: 32px; height: 32px;
border-radius: 6px; cursor: pointer; font-size: 1.1rem;
display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.dnav-btn:hover { background: var(–accent); color: white; }
#dateInput { margin: 0; flex: 1; }
.today-btn {
background: var(–primary); color: white; border: none;
padding: 7px 12px; border-radius: 6px; cursor: pointer;
font-family: inherit; font-size: 0.8rem; flex-shrink: 0;
}
.empty { text-align: center; color: #bbb; padding: 50px 20px; font-size: 0.9rem; line-height: 2; }

.student-item {
display: flex; align-items: center; gap: 10px;
padding: 11px 12px; border-radius: 7px; border: 1px solid transparent;
cursor: pointer; transition: background .15s; margin-bottom: 4px;
}
.student-item:hover { background: #f5f0eb; }
.s-avatar {
width: 36px; height: 36px; border-radius: 50%; background: var(–secondary);
display: flex; align-items: center; justify-content: center;
font-weight: 700; font-size: 0.85rem; color: var(–primary); flex-shrink: 0;
}
.s-info { flex: 1; }
.s-name { font-size: 0.9rem; font-weight: 600; }
.s-num  { font-size: 0.72rem; color: #999; }
.s-count { background: var(–secondary); color: var(–primary); font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }

.cal-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 10px; }
.cal-head-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(–primary); padding: 4px 10px; }
.cal-month { font-weight: 700; font-size: 1rem; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-dow { text-align: center; font-size: 0.72rem; color: #999; padding: 4px 0; }
.cal-day {
aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
border-radius: 7px; font-size: 0.85rem; color: #555; border: 1px solid transparent;
}
.cal-day.has-rec { background: var(–secondary); color: var(–primary); font-weight: 700; cursor: pointer; }
.cal-day.has-rec:hover { background: var(–accent); color: white; }
.cal-day.today { border-color: var(–primary); }
.cal-day.empty { visibility: hidden; }
.cal-day.sun { color: #c62828; } .cal-day.sat { color: #1565c0; }
.cal-day.has-rec.sun, .cal-day.has-rec.sat { color: var(–primary); }
.cal-detail { margin-top: 12px; background: #f9f7f4; border-radius: 8px; padding: 12px; border: 1px solid var(–secondary); }
.cal-detail-date { font-weight: 700; color: var(–primary); margin-bottom: 8px; font-size: 0.9rem; display: flex; align-items: center; justify-content: space-between; }
.cal-item { padding: 8px 10px; background: white; border-radius: 6px; margin-bottom: 6px; border: 1px solid #eee; font-size: 0.84rem; line-height: 1.55; }

.edit-banner {
background: #FFF9C4; border: 1px solid #F9A825; border-radius: 8px;
padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;
}

/* 토스트 & 인디케이터 */
#toast {
position: fixed; bottom: calc(24px + var(–safe-bottom)); left: 50%; transform: translateX(-50%);
background: rgba(0,0,0,0.78); color: white; padding: 11px 22px; border-radius: 22px;
font-size: 0.9rem; z-index: 9999; opacity: 0; transition: opacity .3s;
pointer-events: none; white-space: nowrap; font-family: inherit;
}
#toast.show { opacity: 1; }
#bg-status {
position: fixed; top: calc(var(–safe-top) + 10px); right: 10px;
font-size: 0.72rem; padding: 4px 10px; border-radius: 12px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none;
}
#bg-status.saving { background: #FFF9C4; color: #7B6000; opacity: 1; }
#bg-status.saved  { background: #E8F5E9; color: #2E7D32; opacity: 1; }
#bg-status.error  { background: #FFEBEE; color: #C62828; opacity: 1; }
#bg-status.hide   { opacity: 0; }
#loading {
position: fixed; inset: 0; background: rgba(0,0,0,0.35);
display: flex; align-items: center; justify-content: center;
z-index: 9998; font-size: 1.1rem; color: white; font-family: inherit;
}
.hidden { display: none !important; }
section.hidden { display: none !important; }

.modal-overlay {
position: fixed; inset: 0; background: rgba(0,0,0,0.5);
display: flex; align-items: center; justify-content: center; z-index: 9990; padding: 20px;
}
.modal-box { background: var(–paper); border-radius: 12px; padding: 22px; width: 100%; max-width: 380px; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
.modal-box h3 { margin-bottom: 10px; }
.modal-box p  { font-size: 0.8rem; color: #888; line-height: 1.7; margin-bottom: 12px; }
.modal-btns { display: flex; gap: 8px; margin-top: 12px; }
.modal-btns button { flex: 1; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(–secondary); border-radius: 10px; }
</style>

</head>
<body>
<div id="loading" class="hidden">불러오는 중...</div>
<div id="toast"></div>
<div id="bg-status"></div>

<div id="app">
  <div class="header">
    <div class="title">학생 상담</div>
    <div style="margin-top:6px;">
      <button onclick="openGasModal()" style="background:none;border:none;font-family:inherit;font-size:0.8rem;color:#888;cursor:pointer;">⚙️ GAS 설정</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-daily"    onclick="switchTab('daily')">📅 일별조회</button>
    <button class="tab-btn"        id="tab-cal"      onclick="switchTab('cal')">👤 학생달력</button>
    <button class="tab-btn"        id="tab-write"    onclick="switchTab('write')">✏️ 상담입력</button>
    <button class="tab-btn"        id="tab-students" onclick="switchTab('students')">👥 학생명단</button>
  </div>

  <!-- 탭1: 일별 조회 -->

  <section id="sec-daily">
    <div class="date-nav">
      <button class="dnav-btn" onclick="shiftDate(-1)">‹</button>
      <input type="date" id="dateInput" onchange="loadCounselsByDate()">
      <button class="dnav-btn" onclick="shiftDate(1)">›</button>
      <button class="today-btn" onclick="goToday()">오늘</button>
    </div>
    <div class="container" id="counselArea">
      <div class="empty">날짜를 선택하고<br>상담 기록을 확인하세요</div>
    </div>
  </section>

  <!-- 탭2: 학생별 달력 -->

  <section id="sec-cal" class="hidden">
    <div class="container">
      <label>학생 선택</label>
      <select id="calStudentSelect" onchange="loadCalendar()">
        <option value="">— 학생을 선택하세요 —</option>
      </select>
      <div id="calArea"></div>
    </div>
  </section>

  <!-- 탭3: 상담 입력 -->

  <section id="sec-write" class="hidden">
    <div class="container">
      <div id="edit-banner" class="edit-banner hidden">
        <span style="font-size:0.88rem;color:#7B6000;">✏️ 수정 모드</span>
        <button onclick="cancelEdit()" class="btn btn-outline btn-sm">취소</button>
      </div>
      <label>학생</label>
      <select id="studentSelect"><option value="">학생 선택</option></select>
      <label>상담 날짜</label>
      <input type="date" id="writeDateInput">
      <label>유형</label>
      <select id="typeSelect">
        <option value="학업">학업</option>
        <option value="생활">생활</option>
        <option value="진로">진로</option>
        <option value="심리">심리</option>
        <option value="기타">기타</option>
      </select>
      <label>상담 내용</label>
      <textarea id="contentInput" placeholder="상담 내용을 입력하세요..."></textarea>
      <label>비고/메모 <span style="color:#bbb;font-size:0.78rem;">(선택)</span></label>
      <textarea id="memoInput" placeholder="추가 메모..." style="min-height:56px;"></textarea>
      <button class="btn" id="submitBtn" onclick="submitCounsel()" style="margin-top:6px;">저장</button>
    </div>
  </section>

  <!-- 탭4: 학생 명단 -->

  <section id="sec-students" class="hidden">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <span style="font-size:0.8rem;color:#999;">구글 시트 학생명단 기준</span>
        <button onclick="forceReloadStudents()" class="btn btn-outline btn-sm">↺ 새로고침</button>
      </div>
      <div id="studentList"><div class="empty">GAS 설정 후 새로고침 해주세요</div></div>
    </div>
  </section>
</div>

<!-- GAS 모달 -->

<div id="gasModal" class="modal-overlay hidden" onclick="closeGasOutside(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>⚙️ GAS 설정</h3>
    <p>Google Apps Script 배포 URL을 입력하세요.<br>
    시트: <b>학생명단</b>(A:학번, B:이름) · <b>상담일지</b>(A:ID, B:학번, C:이름, D:날짜, E:유형, F:내용, G:비고)</p>
    <input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/.../exec" style="font-size:0.78rem;font-family:monospace;">
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="document.getElementById('gasModal').classList.add('hidden')">취소</button>
      <button class="btn" onclick="saveGasUrl()">저장 & 연결</button>
    </div>
  </div>
</div>

<script>
// ★ GAS URL을 코드에 직접 넣으려면 아래 '' 안에 입력
let GAS_URL = localStorage.getItem('counsel_gas_url') || '';

let students  = [];
let counsels  = [];
let editingId = null;
let calYear   = new Date().getFullYear();
let calMonth  = new Date().getMonth();
let calData   = [];

window.addEventListener('DOMContentLoaded', () => {
  const today = fmt(new Date());
  document.getElementById('dateInput').value      = today;
  document.getElementById('writeDateInput').value = today;
  if (GAS_URL) { loadStudents(); loadCounselsByDate(); }
});

function fmt(d) { return d.toISOString().slice(0,10); }

function switchTab(tab) {
  ['daily','cal','write','students'].forEach(t => {
    document.getElementById('sec-' + t).classList.toggle('hidden', t !== tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
}

/* API */
async function callApi(action, params={}) {
  if (!GAS_URL) { showToast('GAS URL을 먼저 설정해주세요'); return null; }
  document.getElementById('loading').classList.remove('hidden');
  try {
    const r = await fetch(GAS_URL, { method:'POST', mode:'cors', body: JSON.stringify({action,...params}) });
    const j = await r.json();
    if (j.status === 'error') throw new Error(j.message);
    return j.data;
  } catch(e) { showToast('오류: ' + e.message); return null; }
  finally { document.getElementById('loading').classList.add('hidden'); }
}
async function callApiBg(action, params={}, label='저장') {
  setBg('saving', `⏳ ${label} 중...`);
  try {
    const r = await fetch(GAS_URL, { method:'POST', mode:'cors', body: JSON.stringify({action,...params}) });
    const j = await r.json();
    if (j.status === 'error') throw new Error(j.message);
    setBg('saved', `✅ ${label} 완료`);
    return j.data;
  } catch(e) { setBg('error', `⚠️ ${label} 실패`); showToast(`${label} 실패: ${e.message}`); throw e; }
}
function setBg(state, text) {
  const el = document.getElementById('bg-status');
  el.className = state; el.textContent = text;
  if (state==='saved'||state==='error') setTimeout(()=>{ el.className='hide'; }, 2500);
}

/* 학생 명단 */
async function loadStudents() {
  const d = await callApi('getStudents');
  if (!d) return;
  students = d.students || [];
  renderStudentList(); renderSelects();
}
async function forceReloadStudents() {
  const d = await callApi('getStudents', { noCache: true });
  if (!d) return;
  students = d.students || [];
  renderStudentList(); renderSelects();
  showToast('학생 명단을 새로 불러왔습니다');
}
function renderStudentList() {
  const el = document.getElementById('studentList');
  if (!students.length) { el.innerHTML = '<div class="empty">학생 없음</div>'; return; }
  el.innerHTML = students.map(s => `
    <div class="student-item" onclick="goStudentCal('${s.num}','${s.name}')">
      <div class="s-avatar">${s.name[0]}</div>
      <div class="s-info"><div class="s-name">${s.name}</div><div class="s-num">${s.num}</div></div>
      ${s.totalCount>0 ? `<span class="s-count">${s.totalCount}건</span>` : ''}
      <span style="color:#bbb;font-size:1rem;padding:4px 6px;">📅</span>
    </div>
  `).join('');
}
function renderSelects() {
  const o = '<option value="">학생 선택</option>' + students.map(s=>`<option value="${s.num}">${s.num} ${s.name}</option>`).join('');
  document.getElementById('studentSelect').innerHTML = o;
  const o2 = '<option value="">— 학생을 선택하세요 —</option>' + students.map(s=>`<option value="${s.num}">${s.num} ${s.name}</option>`).join('');
  document.getElementById('calStudentSelect').innerHTML = o2;
}
function goStudentCal(num) {
  document.getElementById('calStudentSelect').value = num;
  calYear = new Date().getFullYear(); calMonth = new Date().getMonth(); calData = [];
  switchTab('cal'); loadCalendar();
}

/* 탭1: 일별 조회 */
function shiftDate(d) {
  const inp = document.getElementById('dateInput');
  const dt = new Date(inp.value); dt.setDate(dt.getDate()+d);
  inp.value = fmt(dt); loadCounselsByDate();
}
function goToday() { document.getElementById('dateInput').value = fmt(new Date()); loadCounselsByDate(); }
async function loadCounselsByDate() {
  const date = document.getElementById('dateInput').value;
  if (!date) return;
  const area = document.getElementById('counselArea');
  area.innerHTML = '<div class="empty">불러오는 중...</div>';
  const d = await callApi('getCounselsByDate', { date });
  if (!d) { area.innerHTML = '<div class="empty">불러오기 실패</div>'; return; }
  counsels = d.counsels || [];
  if (!counsels.length) { area.innerHTML = '<div class="empty">해당 날짜의 상담 기록이 없습니다</div>'; return; }
  area.innerHTML = counsels.map(c => `
    <div class="counsel-card" id="card-${c.id}">
      <div class="counsel-head">
        <span class="counsel-name">${c.name||''}</span>
        <span class="counsel-num">${c.num||''}</span>
        <span class="type-badge type-${c.type||'기타'}">${c.type||'기타'}</span>
      </div>
      <div class="counsel-content">${esc(c.content||'')}</div>
      ${c.memo?`<div class="counsel-memo">📝 ${esc(c.memo)}</div>`:''}
      <div class="counsel-actions">
        <button class="icon-btn" onclick="startEdit('${c.id}','${c.num}','${c.type}',\`${(c.content||'').replace(/`/g,"'")}\`,\`${(c.memo||'').replace(/`/g,"'")}\`,'${c.date}')">✏️ 수정</button>
        <button class="icon-btn del" onclick="deleteCounsel('${c.id}')">🗑 삭제</button>
      </div>
    </div>
  `).join('');
}

/* 탭3: 상담 입력 */
async function submitCounsel() {
  const num     = document.getElementById('studentSelect').value;
  const date    = document.getElementById('writeDateInput').value;
  const type    = document.getElementById('typeSelect').value;
  const content = document.getElementById('contentInput').value.trim();
  const memo    = document.getElementById('memoInput').value.trim();
  if (!num)     { showToast('학생을 선택하세요'); return; }
  if (!date)    { showToast('날짜를 선택하세요'); return; }
  if (!content) { showToast('상담 내용을 입력하세요'); return; }
  const student = students.find(s=>s.num===num)||{num,name:''};
  const isEdit  = editingId !== null;
  const savedId = editingId;
  cancelEdit();
  document.getElementById('dateInput').value = date;
  switchTab('daily');
  try {
    await callApiBg(isEdit?'updateCounsel':'saveCounsel',
      {id:savedId,num:student.num,name:student.name,date,type,content,memo},
      isEdit?'수정':'저장');
    if (!isEdit) refreshCount(student.num, +1);
    await loadCounselsByDate();
  } catch(e) {}
}
function startEdit(id,num,type,content,memo,date) {
  editingId=id;
  document.getElementById('studentSelect').value  =num;
  document.getElementById('writeDateInput').value =date;
  document.getElementById('typeSelect').value     =type;
  document.getElementById('contentInput').value   =content;
  document.getElementById('memoInput').value      =memo;
  document.getElementById('edit-banner').classList.remove('hidden');
  document.getElementById('submitBtn').textContent='수정 저장';
  switchTab('write');
}
function cancelEdit() {
  editingId=null;
  document.getElementById('studentSelect').value  ='';
  document.getElementById('writeDateInput').value =fmt(new Date());
  document.getElementById('typeSelect').value     ='학업';
  document.getElementById('contentInput').value   ='';
  document.getElementById('memoInput').value      ='';
  document.getElementById('edit-banner').classList.add('hidden');
  document.getElementById('submitBtn').textContent='저장';
}
async function deleteCounsel(id) {
  if (!confirm('이 상담 기록을 삭제할까요?')) return;
  const c=counsels.find(x=>x.id===id);
  const card=document.getElementById('card-'+id);
  if (card) { card.style.opacity='.3'; card.style.pointerEvents='none'; }
  try {
    await callApiBg('deleteCounsel',{id},'삭제');
    if (c) refreshCount(c.num,-1);
    await loadCounselsByDate();
  } catch(e) { if(card){card.style.opacity='';card.style.pointerEvents='';} }
}
function refreshCount(num,delta) {
  const s=students.find(s=>s.num===String(num));
  if(!s) return;
  s.totalCount=Math.max(0,(s.totalCount||0)+delta);
  renderStudentList();
}

/* 탭2: 학생별 달력 */
async function loadCalendar() {
  const num=document.getElementById('calStudentSelect').value;
  if (!num) { document.getElementById('calArea').innerHTML=''; return; }
  calData=[];
  const d=await callApi('getCounselHistory',{num});
  if (d&&d.history) calData=d.history;
  renderCalendar();
}
function shiftCalMonth(d) {
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function renderCalendar() {
  const area=document.getElementById('calArea');
  const prefix=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const dmap={};
  calData.filter(d=>d.date.startsWith(prefix)).forEach(d=>{dmap[d.date]=d.counsels;});
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=fmt(new Date());
  const dows=['일','월','화','수','목','금','토'];
  let html=`<div class="cal-head">
    <button class="cal-head-btn" onclick="shiftCalMonth(-1)">‹</button>
    <span class="cal-month">${calYear}년 ${calMonth+1}월</span>
    <button class="cal-head-btn" onclick="shiftCalMonth(1)">›</button>
  </div>
  <div class="cal-grid">
    ${dows.map((d,i)=>`<div class="cal-dow" style="${i===0?'color:#c62828':i===6?'color:#1565c0':''}">${d}</div>`).join('')}
  `;
  for(let i=0;i<first;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++) {
    const ds=`${prefix}-${String(d).padStart(2,'0')}`;
    const dow=(first+d-1)%7;
    const cls=['cal-day',dmap[ds]?'has-rec':'',ds===todayStr?'today':'',!dmap[ds]&&dow===0?'sun':'',!dmap[ds]&&dow===6?'sat':''].filter(Boolean).join(' ');
    const clk=dmap[ds]?`onclick="onCalClick('${ds}')"`:'' ;
    html+=`<div class="${cls}" ${clk}>${d}</div>`;
  }
  html+=`</div><div style="font-size:0.75rem;color:#aaa;margin-top:10px;">🟫 상담 기록 있음 &nbsp;□ 오늘</div><div id="calDetail" style="margin-top:10px;"></div>`;
  area.innerHTML=html;
}
function onCalClick(dateStr) {
  const entry=calData.find(d=>d.date===dateStr);
  const el=document.getElementById('calDetail');
  if (!entry) { el.innerHTML=''; return; }
  el.innerHTML=`<div class="cal-detail">
    <div class="cal-detail-date"><span>📅 ${dateStr} · ${entry.counsels.length}건</span>
      <button onclick="jumpToDate('${dateStr}')" style="background:none;border:1px solid var(--secondary);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:0.75rem;font-family:inherit;color:var(--primary);">이 날 보기</button>
    </div>
    ${entry.counsels.map(c=>`<div class="cal-item">
      <span class="type-badge type-${c.type||'기타'}">${c.type||'기타'}</span>
      <div style="margin-top:5px;">${esc(c.content||'')}</div>
      ${c.memo?`<div style="font-size:0.78rem;color:#999;margin-top:4px;">📝 ${esc(c.memo)}</div>`:''}
    </div>`).join('')}
  </div>`;
}
function jumpToDate(dateStr) {
  document.getElementById('dateInput').value=dateStr;
  switchTab('daily'); loadCounselsByDate();
}

/* GAS 설정 */
function openGasModal() { document.getElementById('gasUrlInput').value=GAS_URL; document.getElementById('gasModal').classList.remove('hidden'); }
function closeGasOutside(e) { if(e.target===document.getElementById('gasModal')) document.getElementById('gasModal').classList.add('hidden'); }
function saveGasUrl() {
  const url=document.getElementById('gasUrlInput').value.trim();
  if(!url){showToast('URL을 입력하세요');return;}
  GAS_URL=url; localStorage.setItem('counsel_gas_url',url);
  document.getElementById('gasModal').classList.add('hidden');
  showToast('저장됨. 연결 중...'); loadStudents(); loadCounselsByDate();
}

/* 유틸 */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let _tt;
function showToast(msg){clearTimeout(_tt);const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');_tt=setTimeout(()=>t.classList.remove('show'),2500);}
</script>
