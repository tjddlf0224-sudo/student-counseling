<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="상담일지">
<title>상담일지 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   CSS 변수 & 리셋
══════════════════════════════════════════ */
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3350;
  --accent: #5b8dee;
  --accent2: #7c6af7;
  --accent-soft: rgba(91,141,238,0.13);
  --green: #3ecf8e;
  --green-soft: rgba(62,207,142,0.12);
  --orange: #f59e42;
  --orange-soft: rgba(245,158,66,0.12);
  --pink: #f472b6;
  --pink-soft: rgba(244,114,182,0.12);
  --text: #e8eaf0;
  --text2: #8b90a8;
  --text3: #555b78;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.45);
  --header-h: 56px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
  font-family: ‘Noto Sans KR’, sans-serif;
  background: var(–bg); color: var(–text);
  display: flex; flex-direction: column;
  }

/* ══════════════════════════════════════════
헤더
══════════════════════════════════════════ */
header {
background: var(–surface); border-bottom: 1px solid var(–border);
padding: 0 16px; padding-top: var(–safe-top);
height: calc(var(–header-h) + var(–safe-top));
display: flex; align-items: center; gap: 10px;
position: relative; z-index: 200; flex-shrink: 0;
}
.logo {
font-family: ‘Gowun Dodum’, serif;
font-size: 1.1rem; color: var(–accent);
display: flex; align-items: center; gap: 7px; white-space: nowrap;
}
.logo span { color: var(–text); font-size: 0.9rem; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.gas-url-btn {
font-size: 0.72rem; background: var(–surface2);
border: 1px solid var(–border); color: var(–text2);
padding: 5px 12px; border-radius: 20px; cursor: pointer;
transition: all .2s; white-space: nowrap;
}
.gas-url-btn:hover { border-color: var(–accent); color: var(–accent); }

.menu-toggle {
display: none; background: none; border: none;
color: var(–text2); font-size: 1.25rem; cursor: pointer;
padding: 4px 6px; border-radius: 6px; flex-shrink: 0;
}

/* ── 백그라운드 저장 인디케이터 (장원급제반 패턴) ── */
#bg-status {
position: fixed; top: calc(var(–safe-top) + 10px); right: 12px;
font-size: 0.72rem; padding: 4px 10px; border-radius: 12px;
z-index: 998; opacity: 0; transition: opacity .3s; pointer-events: none;
}
#bg-status.saving { background: rgba(91,141,238,.2); color: var(–accent); opacity: 1; }
#bg-status.saved  { background: rgba(62,207,142,.18); color: var(–green); opacity: 1; }
#bg-status.error  { background: rgba(229,85,85,.18); color: #e55; opacity: 1; }
#bg-status.hide   { opacity: 0; }

/* ══════════════════════════════════════════
메인 레이아웃
══════════════════════════════════════════ */
.main-wrap { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ══════════════════════════════════════════
사이드바
══════════════════════════════════════════ */
aside {
width: 220px; min-width: 220px;
background: var(–surface); border-right: 1px solid var(–border);
display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.aside-head {
padding: 14px 12px; border-bottom: 1px solid var(–border);
display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.aside-head h2 { font-size: 0.75rem; color: var(–text2); letter-spacing: .08em; }
.reload-btn {
background: none; border: none; color: var(–text3); cursor: pointer;
font-size: 1rem; padding: 2px; transition: color .2s; flex-shrink: 0;
}
.reload-btn:hover { color: var(–accent); }
.student-list { overflow-y: auto; flex: 1; padding: 6px; }

.student-item {
display: flex; align-items: center; gap: 9px;
padding: 9px 10px; border-radius: var(–radius-sm);
cursor: pointer; transition: background .15s; border: 1px solid transparent;
}
.student-item:hover { background: var(–surface2); }
.student-item.active { background: var(–accent-soft); border-color: var(–accent); }

.student-avatar {
width: 32px; height: 32px; border-radius: 50%;
background: var(–surface2);
display: flex; align-items: center; justify-content: center;
font-size: 0.78rem; font-weight: 700; color: var(–accent); flex-shrink: 0;
}
.student-info { flex: 1; min-width: 0; }
.student-info .name { font-size: 0.86rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.student-info .num { font-size: 0.7rem; color: var(–text3); }

/* 사이드바 학생 아이템 우측 버튼들 */
.student-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.s-btn {
background: none; border: none; color: var(–text3); cursor: pointer;
font-size: 0.85rem; min-width: 28px; min-height: 28px;
display: flex; align-items: center; justify-content: center; transition: color .2s;
border-radius: 6px;
}
.s-btn:hover { color: var(–green); background: var(–surface2); }

/* 상담 건수 뱃지 */
.counsel-count-badge {
font-size: 0.64rem; padding: 1px 6px; border-radius: 10px;
background: var(–accent-soft); color: var(–accent); font-weight: 700;
min-width: 18px; text-align: center; flex-shrink: 0;
}

/* ══════════════════════════════════════════
콘텐츠 영역
══════════════════════════════════════════ */
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ── 날짜 바 ── */
.date-bar {
padding: 10px 16px; border-bottom: 1px solid var(–border);
display: flex; align-items: center; gap: 8px;
background: var(–surface); flex-shrink: 0; flex-wrap: wrap;
}
.date-nav-btn {
background: var(–surface2); border: 1px solid var(–border);
color: var(–text2); width: 34px; height: 34px;
border-radius: 8px; cursor: pointer; font-size: 1rem;
display: flex; align-items: center; justify-content: center;
transition: all .15s; flex-shrink: 0;
}
.date-nav-btn:hover { border-color: var(–accent); color: var(–accent); }
#dateInput {
background: var(–surface2); border: 1px solid var(–border);
color: var(–text); padding: 6px 10px; border-radius: 8px;
font-size: 0.88rem; font-family: inherit; flex-shrink: 0;
}
.today-btn {
background: var(–accent-soft); border: 1px solid var(–accent);
color: var(–accent); padding: 6px 12px; border-radius: 8px;
cursor: pointer; font-size: 0.8rem; font-family: inherit;
transition: all .15s; flex-shrink: 0; white-space: nowrap;
}
.today-btn:hover { background: var(–accent); color: #fff; }
.date-summary { margin-left: auto; font-size: 0.8rem; color: var(–text2); white-space: nowrap; }
.date-summary strong { color: var(–green); }

/* ── 상담 목록 ── */
.counsel-area {
flex: 1; overflow-y: auto; padding: 16px;
display: flex; flex-direction: column; gap: 10px; min-height: 0;
}
.empty-state {
flex: 1; display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 12px;
color: var(–text3); font-size: 0.88rem; text-align: center; padding: 40px 20px;
}
.empty-state .icon { font-size: 2.2rem; opacity: .4; }

.counsel-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: var(–radius); padding: 14px 16px;
display: flex; gap: 12px; transition: border-color .2s;
animation: fadeIn .22s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
.counsel-card:hover { border-color: var(–accent); }

.card-avatar {
width: 38px; height: 38px; border-radius: 50%;
background: var(–surface2);
display: flex; align-items: center; justify-content: center;
font-size: 0.82rem; font-weight: 700; color: var(–accent2); flex-shrink: 0;
}
.card-body { flex: 1; min-width: 0; }
.card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; }
.card-name { font-weight: 700; font-size: 0.92rem; }
.card-num { font-size: 0.75rem; color: var(–text3); }
.type-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
.type-학업 { background: var(–accent-soft); color: var(–accent); }
.type-생활 { background: var(–green-soft); color: var(–green); }
.type-진로 { background: var(–orange-soft); color: var(–orange); }
.type-심리 { background: var(–pink-soft); color: var(–pink); }
.type-기타 { background: rgba(139,144,168,.14); color: var(–text2); }
.card-content { font-size: 0.86rem; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
.card-memo { font-size: 0.78rem; color: var(–text2); margin-top: 7px; padding-top: 7px; border-top: 1px solid var(–border); }
.card-actions { display: flex; gap: 4px; align-items: flex-start; flex-shrink: 0; }
.icon-btn {
background: none; border: 1px solid transparent; color: var(–text3);
padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 0.82rem;
transition: all .15s; min-width: 32px; min-height: 32px;
display: flex; align-items: center; justify-content: center;
}
.icon-btn:hover { border-color: var(–border); color: var(–text); }
.icon-btn.del:hover { border-color: #e55; color: #e55; }
.icon-btn.edit:hover { border-color: var(–accent); color: var(–accent); }

/* ── 입력 패널 ── */
.input-panel {
border-top: 1px solid var(–border);
background: var(–surface); padding: 14px 16px; flex-shrink: 0;
}
.input-panel-head {
font-size: 0.75rem; color: var(–text2); margin-bottom: 10px;
display: flex; align-items: center; gap: 6px;
}
.input-panel-head span { color: var(–accent); font-weight: 600; }
.input-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
.input-col { display: flex; flex-direction: column; gap: 4px; }
.input-label { font-size: 0.7rem; color: var(–text3); }

select, textarea {
background: var(–surface2); border: 1px solid var(–border);
color: var(–text); border-radius: 8px; font-family: inherit; font-size: 0.86rem;
padding: 7px 10px; transition: border-color .15s; outline: none; resize: none;
}
select:focus, textarea:focus { border-color: var(–accent); }
#studentSelect { min-width: 120px; }
#typeSelect { min-width: 90px; }
#contentInput { flex: 1; min-width: 160px; height: 64px; }
#memoInput { width: 160px; height: 64px; }

.submit-btn {
background: var(–accent); border: none; color: #fff;
padding: 0 20px; height: 64px; border-radius: 8px;
cursor: pointer; font-size: 0.88rem; font-family: inherit; font-weight: 600;
white-space: nowrap; transition: background .15s; flex-shrink: 0;
}
.submit-btn:hover { background: #4a7de0; }
.submit-btn:disabled { background: var(–text3); cursor: default; }

/* ══════════════════════════════════════════
태블릿 (641~900px)
══════════════════════════════════════════ */
@media (max-width: 900px) and (min-width: 641px) {
aside { width: 62px; min-width: 62px; }
.aside-head h2 { display: none; }
.student-info { display: none; }
.student-actions { display: none; }
.student-item { justify-content: center; padding: 10px 6px; }
.student-avatar { width: 38px; height: 38px; font-size: 0.88rem; }
}

/* ══════════════════════════════════════════
모바일 (≤ 640px)
══════════════════════════════════════════ */
@media (max-width: 640px) {
.menu-toggle { display: flex; }
.main-wrap { flex-direction: column; position: relative; }

aside {
position: fixed;
top: calc(var(–header-h) + var(–safe-top));
left: 0; bottom: 0;
width: 74vw; max-width: 280px; min-width: unset;
z-index: 300;
transform: translateX(-100%);
transition: transform .28s cubic-bezier(.4,0,.2,1);
box-shadow: var(–shadow);
}
aside.open { transform: translateX(0); }

.sidebar-dim {
display: none; position: fixed; inset: 0; z-index: 299;
background: rgba(0,0,0,.5); animation: fadeIn .2s;
}
.sidebar-dim.show { display: block; }

.content { width: 100%; }
.date-bar { padding: 8px 12px; gap: 6px; }
#dateInput { font-size: 0.82rem; padding: 5px 8px; }
.today-btn { padding: 5px 10px; font-size: 0.76rem; }
.date-nav-btn { width: 30px; height: 30px; }

.counsel-area { padding: 12px; gap: 8px; padding-bottom: calc(60px + 56px + var(–safe-bottom) + 8px); }
.counsel-card { padding: 12px 13px; gap: 10px; }
.card-avatar { width: 34px; height: 34px; font-size: 0.76rem; }

.input-panel {
position: fixed; left: 0; right: 0;
bottom: calc(60px + var(–safe-bottom));
z-index: 250; border-top: 1px solid var(–border);
padding: 12px;
/* 닫혔을 때: 자기 높이(최대 70vh) + 탭바(60px)만큼 아래로 밀어서 완전히 숨김 */
transform: translateY(calc(100% + 60px + var(–safe-bottom)));
transition: transform .3s cubic-bezier(.4,0,.2,1);
max-height: 70vh; overflow-y: auto;
}
.input-panel.panel-open { transform: translateY(0); }

.input-row { flex-direction: column; gap: 8px; }
.input-col { width: 100%; }
#studentSelect, #typeSelect { width: 100%; }
#contentInput { width: 100%; height: 72px; min-width: unset; }
#memoInput { width: 100%; height: 52px; }
.submit-btn { width: 100%; height: 44px; padding: 0; margin-top: 2px; }

.bottom-tabbar { display: flex !important; }
}

/* ══════════════════════════════════════════
하단 탭바 (모바일 전용)
══════════════════════════════════════════ */
.bottom-tabbar {
display: none;
position: fixed; left: 0; right: 0; bottom: 0;
height: calc(60px + var(–safe-bottom)); padding-bottom: var(–safe-bottom);
background: var(–surface); border-top: 1px solid var(–border); z-index: 200;
}
.tab-item {
flex: 1; display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 3px;
cursor: pointer; font-size: 0.64rem; color: var(–text3);
transition: color .15s; padding: 6px 0; user-select: none;
}
.tab-item .tab-icon { font-size: 1.3rem; line-height: 1; }
.tab-item.active { color: var(–accent); }
.tab-item.tab-write-item.active { color: var(–green); }

/* ══════════════════════════════════════════
캘린더 모달
══════════════════════════════════════════ */
.modal-overlay {
position: fixed; inset: 0; background: rgba(0,0,0,.6);
display: flex; align-items: center; justify-content: center;
z-index: 999; animation: fadeIn .18s;
}
.modal {
background: var(–surface); border: 1px solid var(–border);
border-radius: 18px; padding: 22px;
width: min(360px, 92vw); box-shadow: var(–shadow); animation: slideUp .22s ease;
}
@keyframes slideUp { from { transform: translateY(18px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-head h3 { font-size: 0.98rem; }
.modal-head h3 small { color: var(–text2); font-weight: 400; }
.modal-close {
background: none; border: none; color: var(–text2); cursor: pointer;
font-size: 1.2rem; min-width: 32px; min-height: 32px;
display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { color: var(–text); }

.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav-btn {
background: var(–surface2); border: 1px solid var(–border);
color: var(–text2); width: 30px; height: 30px; border-radius: 6px;
cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.cal-nav-btn:hover { border-color: var(–accent); color: var(–accent); }
.cal-title { font-size: 0.92rem; font-weight: 600; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
.cal-dow { font-size: 0.68rem; color: var(–text3); padding: 3px 0; }
.cal-day { font-size: 0.8rem; padding: 7px 2px; border-radius: 6px; color: var(–text2); }
.cal-day.has-record { background: var(–accent-soft); color: var(–accent); font-weight: 700; cursor: pointer; }
.cal-day.has-record:hover { background: var(–accent); color: #fff; }
.cal-day.today { outline: 1px solid var(–text3); }
.cal-day.empty { color: transparent; }
.cal-legend { font-size: 0.72rem; color: var(–text3); margin-top: 12px; text-align: center; }
.cal-legend strong { color: var(–accent); }

/* 달력 날짜 클릭 시 상세 영역 */
.cal-day-detail {
margin-top: 12px; padding: 12px; background: var(–surface2);
border-radius: 10px; font-size: 0.82rem;
}
.cal-day-detail .detail-date { font-weight: 700; color: var(–accent); margin-bottom: 8px; }
.cal-day-detail .detail-card {
padding: 8px 10px; background: var(–surface); border-radius: 8px;
margin-bottom: 6px; border: 1px solid var(–border);
}
.cal-day-detail .detail-card:last-child { margin-bottom: 0; }

/* ══════════════════════════════════════════
상담 수정 모달 (인라인 폼)
══════════════════════════════════════════ */
.edit-modal-box {
background: var(–surface); border: 1px solid var(–border);
border-radius: 18px; padding: 22px;
width: min(440px, 92vw); box-shadow: var(–shadow); animation: slideUp .22s ease;
}
.edit-modal-box h3 { font-size: 0.98rem; margin-bottom: 14px; }
.edit-form-row { display: flex; gap: 8px; margin-bottom: 10px; }
.edit-form-col { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.edit-label { font-size: 0.7rem; color: var(–text3); }
.edit-btns { display: flex; gap: 8px; margin-top: 14px; }
.btn-primary {
flex: 1; background: var(–accent); border: none; color: #fff;
padding: 10px; border-radius: 8px; cursor: pointer;
font-size: 0.88rem; font-family: inherit; font-weight: 600; transition: background .15s;
}
.btn-primary:hover { background: #4a7de0; }
.btn-ghost {
flex: 1; background: var(–surface2); border: 1px solid var(–border); color: var(–text2);
padding: 10px; border-radius: 8px; cursor: pointer;
font-size: 0.88rem; font-family: inherit; transition: all .15s;
}
.btn-ghost:hover { color: var(–text); border-color: var(–text2); }

/* ══════════════════════════════════════════
GAS URL 모달
══════════════════════════════════════════ */
.gas-modal {
background: var(–surface); border: 1px solid var(–border);
border-radius: 18px; padding: 22px;
width: min(480px, 92vw); box-shadow: var(–shadow); animation: slideUp .22s ease;
}
.gas-modal h3 { margin-bottom: 8px; font-size: 0.98rem; }
.gas-modal p { font-size: 0.8rem; color: var(–text2); margin-bottom: 14px; line-height: 1.65; }
.gas-modal code { background: var(–surface2); padding: 1px 5px; border-radius: 4px; font-size: 0.78rem; }
.gas-modal input {
width: 100%; background: var(–surface2); border: 1px solid var(–border);
color: var(–text); padding: 9px 12px; border-radius: 8px;
font-family: monospace; font-size: 0.78rem; outline: none; margin-bottom: 12px;
transition: border-color .15s;
}
.gas-modal input:focus { border-color: var(–accent); }
.gas-modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel {
background: var(–surface2); border: 1px solid var(–border); color: var(–text2);
padding: 8px 16px; border-radius: 8px; cursor: pointer;
font-size: 0.86rem; font-family: inherit; transition: all .15s;
}
.btn-cancel:hover { color: var(–text); border-color: var(–text2); }
.btn-save {
background: var(–accent); border: none; color: #fff;
padding: 8px 16px; border-radius: 8px; cursor: pointer;
font-size: 0.86rem; font-family: inherit; font-weight: 600; transition: background .15s;
}
.btn-save:hover { background: #4a7de0; }

/* ══════════════════════════════════════════
토스트
══════════════════════════════════════════ */
.toast {
position: fixed;
bottom: calc(60px + var(–safe-bottom) + 14px);
left: 50%; transform: translateX(-50%);
background: var(–surface); border: 1px solid var(–border);
border-radius: 10px; padding: 9px 18px;
font-size: 0.86rem; color: var(–text);
box-shadow: var(–shadow); z-index: 9999;
animation: toastIn .25s ease; white-space: nowrap; max-width: 90vw;
}
.toast.success { border-color: var(–green); color: var(–green); }
.toast.error   { border-color: #e55; color: #e55; }
@keyframes toastIn {
from { opacity: 0; transform: translateX(-50%) translateY(8px); }
to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* 스피너 & 스크롤바 */
.spinner {
width: 20px; height: 20px; border: 2px solid var(–border);

<script>
/* ══════════════════════════════════════════
   설정 & 전역 상태
══════════════════════════════════════════ */
let GAS_URL = localStorage.getItem('counsel_gas_url') || '';

let students    = [];   // [{num, name, totalCount}]
let counsels    = [];   // 현재 날짜 상담 목록
let editingId   = null; // 수정 중인 상담 ID (null = 새 입력 모드)

// 캘린더 모달 상태
let calStudentNum  = null;
let calStudentName = '';
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calDates = []; // [{date, counsels:[{id,type,content,memo}]}] 형태로 상세 포함

/* ══════════════════════════════════════════
   초기화
══════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('dateInput').value = formatDate(new Date());
  updateDateLabel();
  if (GAS_URL) { loadStudents(); loadCounselsByDate(); }
});

function formatDate(d) { return d.toISOString().slice(0,10); }
function updateDateLabel() {
  const d = document.getElementById('dateInput').value;
  document.getElementById('selectedDateLabel').textContent = d || '';
}

/* ══════════════════════════════════════════
   API 통신 (장원급제반 패턴: 모두 POST)
   - callApi  : 로딩 필요한 조회용
   - callApiBg: 저장/삭제용 백그라운드 처리
══════════════════════════════════════════ */
async function callApi(action, params = {}) {
  if (!GAS_URL) { showToast('GAS URL을 먼저 설정해주세요', 'error'); return null; }
  try {
    const res  = await fetch(GAS_URL, {
      method: 'POST', mode: 'cors',
      body: JSON.stringify({ action, ...params })
    });
    const json = await res.json();
    if (json.status === 'error') throw new Error(json.message);
    return json.data;
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
    return null;
  }
}

async function callApiBg(action, params = {}, label = '저장') {
  setBgStatus('saving', `⏳ ${label} 중...`);
  try {
    const res  = await fetch(GAS_URL, {
      method: 'POST', mode: 'cors',
      body: JSON.stringify({ action, ...params })
    });
    const json = await res.json();
    if (json.status === 'error') throw new Error(json.message);
    setBgStatus('saved', `✅ ${label} 완료`);
    return json.data;
  } catch(e) {
    setBgStatus('error', `⚠️ ${label} 실패`);
    showToast(`${label} 실패: ${e.message}`, 'error');
    throw e;
  }
}

function setBgStatus(state, text) {
  const el = document.getElementById('bg-status');
  el.className = state; el.textContent = text;
  if (state === 'saved' || state === 'error') {
    setTimeout(() => { el.className = 'hide'; }, 2500);
  }
}

/* ══════════════════════════════════════════
   학생 명단
══════════════════════════════════════════ */
async function loadStudents() {
  const list = document.getElementById('studentList');
  list.innerHTML = '<div style="padding:20px;text-align:center"><div class="spinner"></div></div>';
  const data = await callApi('getStudents');
  if (!data || !data.students) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:0.8rem;">불러오기 실패<br><small>GAS 설정을 확인하세요</small></div>';
    return;
  }
  students = data.students; // [{num, name, totalCount}]
  renderStudentList();
  renderStudentSelect();
}

// 강제 새로고침 (캐시 무시) - ↺ 버튼
async function forceReloadStudents() {
  const list = document.getElementById('studentList');
  list.innerHTML = '<div style="padding:20px;text-align:center"><div class="spinner"></div></div>';
  const data = await callApi('getStudents', { noCache: true });
  if (!data || !data.students) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:0.8rem;">불러오기 실패</div>';
    return;
  }
  students = data.students;
  renderStudentList();
  renderStudentSelect();
  showToast('학생 명단을 새로 불러왔습니다', 'success');
}

function renderStudentList() {
  const list = document.getElementById('studentList');
  if (!students.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:0.8rem;">학생 없음</div>';
    return;
  }
  list.innerHTML = students.map(s => `
    <div class="student-item" data-num="${s.num}" onclick="selectStudent('${s.num}','${s.name}')">
      <div class="student-avatar">${s.name[0]}</div>
      <div class="student-info">
        <div class="name">${s.name}</div>
        <div class="num">${s.num}</div>
      </div>
      <div class="student-actions">
        ${s.totalCount > 0 ? `<span class="counsel-count-badge">${s.totalCount}</span>` : ''}
        <button class="s-btn" title="상담 달력 보기"
          onclick="event.stopPropagation();openCalModal('${s.num}','${s.name}')">📅</button>
      </div>
    </div>
  `).join('');
}

function renderStudentSelect() {
  const sel = document.getElementById('studentSelect');
  const cur = sel.value;
  sel.innerHTML = '<option value="">학생 선택</option>' +
    students.map(s => `<option value="${s.num}">${s.num} ${s.name}</option>`).join('');
  if (cur) sel.value = cur; // 선택 상태 유지
}

function selectStudent(num, name) {
  document.querySelectorAll('.student-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.student-item[data-num="${num}"]`);
  if (el) el.classList.add('active');
  document.getElementById('studentSelect').value = num;
  closeSidebar();
  // 모바일: 상담입력 탭으로 자동 전환
  if (window.innerWidth <= 640) mobileTab('write');
}

/* ══════════════════════════════════════════
   날짜 탐색
══════════════════════════════════════════ */
function shiftDate(delta) {
  const inp = document.getElementById('dateInput');
  const d = new Date(inp.value);
  d.setDate(d.getDate() + delta);
  inp.value = formatDate(d);
  loadCounselsByDate();
}
function goToday() {
  document.getElementById('dateInput').value = formatDate(new Date());
  loadCounselsByDate();
}

/* ══════════════════════════════════════════
   날짜별 상담 목록 로드
══════════════════════════════════════════ */
async function loadCounselsByDate() {
  const date = document.getElementById('dateInput').value;
  if (!date) return;
  updateDateLabel();
  const area = document.getElementById('counselArea');
  area.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';

  const data = await callApi('getCounselsByDate', { date });
  if (!data) { area.innerHTML = emptyHTML(); return; }
  counsels = data.counsels || [];
  renderCounsels();
  const sum = document.getElementById('dateSummary');
  sum.innerHTML = counsels.length ? `<strong>${counsels.length}건</strong>` : '';
}

function emptyHTML() {
  return `<div class="empty-state"><div class="icon">💬</div><div>해당 날짜의 상담 기록이 없습니다</div></div>`;
}

function renderCounsels() {
  const area = document.getElementById('counselArea');
  if (!counsels.length) { area.innerHTML = emptyHTML(); return; }
  area.innerHTML = counsels.map(c => `
    <div class="counsel-card" id="card-${c.id}">
      <div class="card-avatar">${(c.name||'?')[0]}</div>
      <div class="card-body">
        <div class="card-header">
          <span class="card-name">${c.name||''}</span>
          <span class="card-num">${c.num||''}</span>
          <span class="type-badge type-${c.type||'기타'}">${c.type||'기타'}</span>
        </div>
        <div class="card-content">${escHtml(c.content||'')}</div>
        ${c.memo ? `<div class="card-memo">📝 ${escHtml(c.memo)}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="icon-btn edit" title="수정" onclick="startEdit('${c.id}','${c.num}','${c.type}',\`${(c.content||'').replace(/`/g,"'")}\`,\`${(c.memo||'').replace(/`/g,"'")}\`)">✏️</button>
        <button class="icon-btn del" title="삭제" onclick="deleteCounsel('${c.id}')">🗑</button>
      </div>
    </div>
  `).join('');
}

/* ══════════════════════════════════════════
   상담 저장 (신규 & 수정 통합)
══════════════════════════════════════════ */
async function submitCounsel() {
  const num     = document.getElementById('studentSelect').value;
  const type    = document.getElementById('typeSelect').value;
  const content = document.getElementById('contentInput').value.trim();
  const memo    = document.getElementById('memoInput').value.trim();
  const date    = document.getElementById('dateInput').value;

  if (!num)     { showToast('학생을 선택하세요', 'error'); return; }
  if (!content) { showToast('상담 내용을 입력하세요', 'error'); return; }
  if (!date)    { showToast('날짜를 선택하세요', 'error'); return; }

  const student = students.find(s => s.num === num) || { num, name: '' };
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;

  // ★ Optimistic UI: 즉시 목록 탭 전환 후 백그라운드 저장
  const isEdit = editingId !== null;
  mobileTab('list');
  cancelEdit(); // 폼 초기화

  try {
    const action = isEdit ? 'updateCounsel' : 'saveCounsel';
    await callApiBg(action,
      { id: editingId, num: student.num, name: student.name, date, type, content, memo },
      isEdit ? '수정' : '저장'
    );
    // 저장 완료 후 목록 갱신 + 학생 명단 카운트 업데이트
    await loadCounselsByDate();
    if (!isEdit) refreshStudentCount(student.num, +1);
  } catch(e) {
    // 실패 시 폼 복원
    document.getElementById('studentSelect').value = num;
    document.getElementById('typeSelect').value = type;
    document.getElementById('contentInput').value = content;
    document.getElementById('memoInput').value = memo;
    if (isEdit) startEditById(editingId);
  }
}

/* 수정 모드 시작 */
function startEdit(id, num, type, content, memo) {
  editingId = id;
  document.getElementById('studentSelect').value = num;
  document.getElementById('typeSelect').value = type;
  document.getElementById('contentInput').value = content;
  document.getElementById('memoInput').value = memo;
  document.getElementById('editingLabel').textContent = '상담 수정 중';
  document.getElementById('cancelEditBtn').style.display = '';
  document.getElementById('submitBtn').textContent = '수정 저장';

  // 모바일: 입력 탭 열기
  if (window.innerWidth <= 640) mobileTab('write');
  else document.getElementById('contentInput').focus();
}

/* 수정 모드 취소 */
function cancelEdit() {
  editingId = null;
  document.getElementById('studentSelect').value = '';
  document.getElementById('typeSelect').value = '학업';
  document.getElementById('contentInput').value = '';
  document.getElementById('memoInput').value = '';
  document.getElementById('editingLabel').textContent = '새 상담 입력';
  document.getElementById('cancelEditBtn').style.display = 'none';
  document.getElementById('submitBtn').textContent = '저장';
  document.getElementById('submitBtn').disabled = false;
}

/* ══════════════════════════════════════════
   상담 삭제
══════════════════════════════════════════ */
async function deleteCounsel(id) {
  if (!confirm('이 상담 기록을 삭제할까요?')) return;
  const counsel = counsels.find(c => c.id === id);
  // Optimistic: 카드 즉시 제거
  const card = document.getElementById('card-' + id);
  if (card) { card.style.opacity = '0.4'; card.style.pointerEvents = 'none'; }

  try {
    await callApiBg('deleteCounsel', { id }, '삭제');
    if (counsel) refreshStudentCount(counsel.num, -1);
    await loadCounselsByDate();
  } catch(e) {
    if (card) { card.style.opacity = ''; card.style.pointerEvents = ''; }
  }
}

/* 사이드바 상담 건수 실시간 업데이트 */
function refreshStudentCount(num, delta) {
  const s = students.find(s => s.num === String(num));
  if (!s) return;
  s.totalCount = Math.max(0, (s.totalCount || 0) + delta);
  // 해당 아이템만 뱃지 업데이트
  const item = document.querySelector(`.student-item[data-num="${num}"] .student-actions`);
  if (!item) return;
  const badge = item.querySelector('.counsel-count-badge');
  if (s.totalCount > 0) {
    if (badge) badge.textContent = s.totalCount;
    else item.insertAdjacentHTML('afterbegin', `<span class="counsel-count-badge">${s.totalCount}</span>`);
  } else {
    if (badge) badge.remove();
  }
}

/* ══════════════════════════════════════════
   캘린더 모달 (상세 포함)
══════════════════════════════════════════ */
async function openCalModal(num, name) {
  calStudentNum = num; calStudentName = name;
  calYear = new Date().getFullYear(); calMonth = new Date().getMonth();
  document.getElementById('calModalTitle').innerHTML = `${name} <small>상담 달력</small>`;
  document.getElementById('calDayDetail').innerHTML = '';
  document.getElementById('calModal').style.display = 'flex';
  calDates = [];

  // 상세 포함한 상담 이력 로드
  const data = await callApi('getCounselHistory', { num });
  if (data && data.history) calDates = data.history; // [{date, counsels:[...]}]
  renderCalendar();
}

function closeCalModal(e) {
  if (e.target === document.getElementById('calModal'))
    document.getElementById('calModal').style.display = 'none';
}
function shiftCalMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  document.getElementById('calDayDetail').innerHTML = '';
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = `${calYear}년 ${calMonth+1}월`;
  const grid = document.getElementById('calGrid');
  const dows = ['일','월','화','수','목','금','토'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const first    = new Date(calYear, calMonth, 1).getDay();
  const days     = new Date(calYear, calMonth+1, 0).getDate();
  const todayStr = formatDate(new Date());

  // 이번 달 상담 날짜 Set
  const prefix = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const dateSet = new Set(calDates.filter(d => d.date.startsWith(prefix)).map(d => d.date));

  for (let i = 0; i < first; i++) html += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= days; d++) {
    const ds  = `${prefix}-${String(d).padStart(2,'0')}`;
    const cls = 'cal-day' + (dateSet.has(ds) ? ' has-record' : '') + (ds === todayStr ? ' today' : '');
    const clk = dateSet.has(ds) ? `onclick="onCalDayClick('${ds}')"` : '';
    html += `<div class="${cls}" ${clk}>${d}</div>`;
  }
  grid.innerHTML = html;
}

function onCalDayClick(dateStr) {
  const entry  = calDates.find(d => d.date === dateStr);
  const detail = document.getElementById('calDayDetail');
  if (!entry || !entry.counsels.length) { detail.innerHTML = ''; return; }

  detail.innerHTML = `
    <div class="cal-day-detail">
      <div class="detail-date">📅 ${dateStr} · ${entry.counsels.length}건</div>
      ${entry.counsels.map(c => `
        <div class="detail-card">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <span class="type-badge type-${c.type||'기타'}">${c.type||'기타'}</span>
          </div>
          <div style="font-size:0.82rem;line-height:1.55;white-space:pre-wrap">${escHtml(c.content||'')}</div>
          ${c.memo ? `<div style="font-size:0.76rem;color:var(--text2);margin-top:4px">📝 ${escHtml(c.memo)}</div>` : ''}
          <button onclick="jumpToDate('${dateStr}')"
            style="margin-top:6px;background:none;border:1px solid var(--border);color:var(--text2);
                   padding:3px 10px;border-radius:6px;cursor:pointer;font-size:0.74rem;">
            이 날짜로 이동
          </button>
        </div>
      `).join('')}
    </div>`;
}

function jumpToDate(dateStr) {
  document.getElementById('dateInput').value = dateStr;
  document.getElementById('calModal').style.display = 'none';
  loadCounselsByDate();
}

/* ══════════════════════════════════════════
   모바일 탭 & 사이드바
══════════════════════════════════════════ */
function mobileTab(tab) {
  const panel  = document.getElementById('inputPanel');
  const tList  = document.getElementById('tab-list');
  const tWrite = document.getElementById('tab-write');
  if (tab === 'write') {
    panel.classList.add('panel-open');
    tWrite.classList.add('active'); tList.classList.remove('active');
  } else {
    panel.classList.remove('panel-open');
    tList.classList.add('active'); tWrite.classList.remove('active');
  }
}
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const dim     = document.getElementById('sidebarDim');
  sidebar.classList.toggle('open');
  dim.classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarDim').classList.remove('show');
}

/* ══════════════════════════════════════════
   GAS URL 설정
══════════════════════════════════════════ */
function openGasModal() {
  document.getElementById('gasUrlInput').value = GAS_URL;
  document.getElementById('gasModal').style.display = 'flex';
}
function closeGasModalOutside(e) {
  if (e.target === document.getElementById('gasModal'))
    document.getElementById('gasModal').style.display = 'none';
}
function saveGasUrl() {
  const url = document.getElementById('gasUrlInput').value.trim();
  if (!url) { showToast('URL을 입력하세요', 'error'); return; }
  GAS_URL = url;
  localStorage.setItem('counsel_gas_url', url);
  document.getElementById('gasModal').style.display = 'none';
  showToast('설정 저장됨. 연결 중...', 'success');
  loadStudents(); loadCounselsByDate();
}

/* ══════════════════════════════════════════
   유틸
══════════════════════════════════════════ */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
let toastTimer;
function showToast(msg, type='') {
  clearTimeout(toastTimer);
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg;
  document.body.appendChild(t);
  toastTimer = setTimeout(() => t.remove(), 3000);
}
</script>
